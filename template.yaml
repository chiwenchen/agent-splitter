AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SplitSettle - AI Agent expense splitting MCP tool

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: python3.13

Resources:
  SplitSettleApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingRateLimit: 10    # sustained requests per second
        ThrottlingBurstLimit: 20   # max concurrent burst

  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: split-settle/api-key
      Description: API Key for SplitSettle service (x-api-key header)

  SplitSettleFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/split_settle/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          SECRET_ARN: !Ref ApiKeySecret
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref ApiKeySecret
      Events:
        SplitSettle:
          Type: HttpApi
          Properties:
            Path: /v1/split_settle
            Method: post
            ApiId: !Ref SplitSettleApi
        OpenApi:
          Type: HttpApi
          Properties:
            Path: /openapi.json
            Method: get
            ApiId: !Ref SplitSettleApi

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${SplitSettleApi}.execute-api.${AWS::Region}.amazonaws.com/v1/split_settle"
  OpenApiUrl:
    Description: OpenAPI schema URL
    Value: !Sub "https://${SplitSettleApi}.execute-api.${AWS::Region}.amazonaws.com/openapi.json"
  SecretArn:
    Description: Secrets Manager ARN (retrieve key value from AWS Console or CLI)
    Value: !Ref ApiKeySecret
