AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SplitSettle - AI Agent expense splitting MCP tool

Globals:
  Function:
    MemorySize: 128
    Runtime: python3.13

Resources:
  SplitSettleApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingRateLimit: 10
        ThrottlingBurstLimit: 20
      CorsConfiguration:
        AllowOrigins:
          - "https://split.redarch.dev"
          - "https://split-admin.redarch.dev"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-Api-Key
          - Cf-Access-Jwt-Assertion
          - X-Device-Id
        MaxAge: 300

  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: split-settle/api-key-v2
      Description: |
        API Key for SplitSettle service (x-api-key header).
        Value populated post-deploy via:
          aws secretsmanager put-secret-value --secret-id split-settle/api-key-v2 \
            --secret-string "$(python3 -c 'import secrets; print(secrets.token_urlsafe(36))')"
        Lambda fail-closes if this resolves to an empty string.

  AlchemySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: split-settle/alchemy-api-key
      Description: Alchemy RPC URL for Base Mainnet payment verification

  UsedPaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-used-payments"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD_INFREQUENT_ACCESS
      AttributeDefinitions:
        - AttributeName: tx_hash
          AttributeType: S
      KeySchema:
        - AttributeName: tx_hash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl_expiry
        Enabled: true

  GroupsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-groups"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD_INFREQUENT_ACCESS
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SplitSettleFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/split_settle/
      Handler: handler.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          SECRET_ARN: !Ref ApiKeySecret
          ALCHEMY_SECRET_ARN: !Ref AlchemySecret
          PAYMENTS_TABLE: !Ref UsedPaymentsTable
          GROUPS_TABLE: !Ref GroupsTable
          ALLOWED_HOSTS: "split.redarch.dev,split-admin.redarch.dev"
          CF_ACCESS_TEAM_DOMAIN: "redarch.cloudflareaccess.com"
          CF_ACCESS_AUD: "92097101075a4b784478b1f54092148c842ccdd2f42724cb838a1bac7dc11d66"
          CF_ALLOWED_EMAIL: "cwchen2000@gmail.com"
          CF_API_TOKEN_ARN: "arn:aws:secretsmanager:ap-northeast-1:274571492950:secret:split-settle/cloudflare-api-token"
          CF_ZONE_ID: "2fdc064b300cf497b17c10d7e0bd9ab1"
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref ApiKeySecret
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AlchemySecret
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:split-settle/cloudflare-api-token-*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt UsedPaymentsTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:DeleteItem
              Resource: !GetAtt GroupsTable.Arn
      Events:
        SplitSettle:
          Type: HttpApi
          Properties:
            Path: /v1/split_settle
            Method: post
            ApiId: !Ref SplitSettleApi
        OpenApi:
          Type: HttpApi
          Properties:
            Path: /openapi.json
            Method: get
            ApiId: !Ref SplitSettleApi
        Health:
          Type: HttpApi
          Properties:
            Path: /health
            Method: get
            ApiId: !Ref SplitSettleApi
        Groups:
          Type: HttpApi
          Properties:
            Path: /v1/groups
            Method: post
            ApiId: !Ref SplitSettleApi
        Docs:
          Type: HttpApi
          Properties:
            Path: /docs
            Method: get
            ApiId: !Ref SplitSettleApi
        Home:
          Type: HttpApi
          Properties:
            Path: /
            Method: get
            ApiId: !Ref SplitSettleApi
        OgImage:
          Type: HttpApi
          Properties:
            Path: /og-image.png
            Method: get
            ApiId: !Ref SplitSettleApi
        SharePicker:
          Type: HttpApi
          Properties:
            Path: /share
            Method: get
            ApiId: !Ref SplitSettleApi
        ShareApi:
          Type: HttpApi
          Properties:
            Path: /v1/share
            Method: post
            ApiId: !Ref SplitSettleApi
        SharePage:
          Type: HttpApi
          Properties:
            Path: /s/{id}
            Method: get
            ApiId: !Ref SplitSettleApi
        ShareJson:
          Type: HttpApi
          Properties:
            Path: /v1/share/{id}
            Method: get
            ApiId: !Ref SplitSettleApi
        ShareAccountsList:
          Type: HttpApi
          Properties:
            Path: /v1/share/{id}/accounts
            Method: get
            ApiId: !Ref SplitSettleApi
        ShareAccountsPut:
          Type: HttpApi
          Properties:
            Path: /v1/share/{id}/accounts/{participant}
            Method: put
            ApiId: !Ref SplitSettleApi
        ShareAccountsDelete:
          Type: HttpApi
          Properties:
            Path: /v1/share/{id}/accounts/{participant}
            Method: delete
            ApiId: !Ref SplitSettleApi
        AppleAppSiteAssociation:
          Type: HttpApi
          Properties:
            Path: /.well-known/apple-app-site-association
            Method: get
            ApiId: !Ref SplitSettleApi
        AssetLinks:
          Type: HttpApi
          Properties:
            Path: /.well-known/assetlinks.json
            Method: get
            ApiId: !Ref SplitSettleApi
        AdminRoot:
          Type: HttpApi
          Properties:
            Path: /admin
            Method: get
            ApiId: !Ref SplitSettleApi
        AdminApi:
          Type: HttpApi
          Properties:
            Path: /admin/{proxy+}
            Method: any
            ApiId: !Ref SplitSettleApi

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${SplitSettleApi}.execute-api.${AWS::Region}.amazonaws.com/v1/split_settle"
  OpenApiUrl:
    Description: OpenAPI schema URL
    Value: !Sub "https://${SplitSettleApi}.execute-api.${AWS::Region}.amazonaws.com/openapi.json"
  SecretArn:
    Description: Secrets Manager ARN for API key
    Value: !Ref ApiKeySecret
  AlchemySecretArn:
    Description: Secrets Manager ARN for Alchemy RPC URL
    Value: !Ref AlchemySecret
  UsedPaymentsTableName:
    Description: DynamoDB table for replay attack prevention
    Value: !Ref UsedPaymentsTable
  GroupsTableName:
    Description: DynamoDB table for wallet group registry
    Value: !Ref GroupsTable
