AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SplitSettle - AI Agent expense splitting MCP tool

Globals:
  Function:
    MemorySize: 128
    Runtime: python3.13

Resources:
  SplitSettleApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingRateLimit: 10
        ThrottlingBurstLimit: 20

  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: split-settle/api-key
      Description: API Key for SplitSettle service (x-api-key header)

  AlchemySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: split-settle/alchemy-api-key
      Description: Alchemy RPC URL for Base Mainnet payment verification

  UsedPaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-used-payments"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD_INFREQUENT_ACCESS
      AttributeDefinitions:
        - AttributeName: tx_hash
          AttributeType: S
      KeySchema:
        - AttributeName: tx_hash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl_expiry
        Enabled: true

  GroupsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-groups"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD_INFREQUENT_ACCESS
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SplitSettleFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/split_settle/
      Handler: handler.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          SECRET_ARN: !Ref ApiKeySecret
          ALCHEMY_SECRET_ARN: !Ref AlchemySecret
          PAYMENTS_TABLE: !Ref UsedPaymentsTable
          GROUPS_TABLE: !Ref GroupsTable
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref ApiKeySecret
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AlchemySecret
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt UsedPaymentsTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:Query
              Resource: !GetAtt GroupsTable.Arn
      Events:
        SplitSettle:
          Type: HttpApi
          Properties:
            Path: /v1/split_settle
            Method: post
            ApiId: !Ref SplitSettleApi
        OpenApi:
          Type: HttpApi
          Properties:
            Path: /openapi.json
            Method: get
            ApiId: !Ref SplitSettleApi
        Health:
          Type: HttpApi
          Properties:
            Path: /health
            Method: get
            ApiId: !Ref SplitSettleApi
        Groups:
          Type: HttpApi
          Properties:
            Path: /v1/groups
            Method: post
            ApiId: !Ref SplitSettleApi

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${SplitSettleApi}.execute-api.${AWS::Region}.amazonaws.com/v1/split_settle"
  OpenApiUrl:
    Description: OpenAPI schema URL
    Value: !Sub "https://${SplitSettleApi}.execute-api.${AWS::Region}.amazonaws.com/openapi.json"
  SecretArn:
    Description: Secrets Manager ARN for API key
    Value: !Ref ApiKeySecret
  AlchemySecretArn:
    Description: Secrets Manager ARN for Alchemy RPC URL
    Value: !Ref AlchemySecret
  UsedPaymentsTableName:
    Description: DynamoDB table for replay attack prevention
    Value: !Ref UsedPaymentsTable
  GroupsTableName:
    Description: DynamoDB table for wallet group registry
    Value: !Ref GroupsTable
